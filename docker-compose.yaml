services:
  app:
    build: .
    ports:
      - "1323:1323"
    environment:
      - PORT=1323
      - DATABASE_URL=postgres://postgres:postgres@db:5432/drones?sslmode=disable
      - JWT_SECRET=super-secret-key-change-me-in-production
      - JWT_TTL=24h
      - AVG_SPEED_MS=10
      - LOG_LEVEL=debug
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=drones
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
